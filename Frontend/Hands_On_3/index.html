<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Course Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Student Course Portal</h1>
    </header>

    <main>
        <div class="controls">
            <input
                type="text"
                id="search-courses"
                placeholder="Search courses..."
            >

            <button id="sort-btn">Sort by Credits</button>
        </div>

        <div class="course-grid"></div>

        <p id="total-credits"></p>

        <div id="selected-course"></div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
