<h2>Course Catalog</h2>

<input
  type="text"
  placeholder="Search courses..."
  [(ngModel)]="searchTerm"
  class="search"
/>

<div *ngIf="loading" class="spinner">
  Loading Courses...
</div>

<div
  *ngIf="!loading && filteredCourses.length === 0"
  class="empty"
>
  No courses found
</div>

<div class="grid">

  <app-course-card
    *ngFor="let course of filteredCourses"
    [name]="course.name"
    [code]="course.code"
    [credits]="course.credits"
    [grade]="course.grade">
  </app-course-card>

</div>
