<div class="profile-container">
  <div class="profile-card">
    <div class="profile-header">
      <div class="avatar-placeholder">👤</div>
      <h2 class="profile-title">Student Profile Settings</h2>
      <p class="profile-subtitle">Update your portal registration and academic details</p>
    </div>
    
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="profile-form">
      <!-- Name -->
      <div class="form-group">
        <label for="name" class="form-label">Full Name</label>
        <input 
          id="name" 
          type="text" 
          formControlName="name" 
          class="form-control" 
          [class.is-invalid]="profileForm.get('name')?.invalid && (profileForm.get('name')?.touched || profileForm.get('name')?.dirty)"
          placeholder="e.g. John Doe"
        />
        <div *ngIf="profileForm.get('name')?.invalid && (profileForm.get('name')?.touched || profileForm.get('name')?.dirty)" class="error-msg">
          Name is required
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          class="form-control" 
          [class.is-invalid]="profileForm.get('email')?.invalid && (profileForm.get('email')?.touched || profileForm.get('email')?.dirty)"
          placeholder="e.g. john.doe@university.edu"
        />
        <div *ngIf="profileForm.get('email')?.invalid && (profileForm.get('email')?.touched || profileForm.get('email')?.dirty)" class="error-msg">
          Enter valid email
        </div>
      </div>

      <!-- Semester -->
      <div class="form-group">
        <label for="semester" class="form-label">Current Semester</label>
        <input 
          id="semester" 
          type="number" 
          formControlName="semester" 
          class="form-control" 
          [class.is-invalid]="profileForm.get('semester')?.invalid && (profileForm.get('semester')?.touched || profileForm.get('semester')?.dirty)"
          placeholder="Value between 1 and 8"
        />
        <div *ngIf="profileForm.get('semester')?.invalid && (profileForm.get('semester')?.touched || profileForm.get('semester')?.dirty)" class="error-msg">
          Semester must be between 1 and 8
        </div>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        [disabled]="profileForm.invalid" 
        class="btn btn-primary"
      >
        Save Profile
      </button>
    </form>
  </div>
</div>
